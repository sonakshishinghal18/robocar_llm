<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Robocar AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
  video { width: 100vw; height: 100vh; object-fit: cover; }
  canvas { display: none; }

  .overlay { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 50px 20px 30px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    pointer-events: all;
  }
  .status { font-size: 15px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #636370; flex-shrink: 0; transition: background 0.3s; }
  .status-dot.active { background: #30d158; box-shadow: 0 0 6px #30d15880; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .narration {
    font-size: 14px; color: #e0e0e0; line-height: 1.6;
    background: rgba(0,0,0,0.55); border-radius: 12px;
    padding: 10px 14px; margin-top: 8px;
    min-height: 22px; border-left: 3px solid #1c86f5;
  }
  .motor-status { margin-top: 8px; font-size: 18px; font-weight: 700; letter-spacing: 2px; }
  .duration-info { font-size: 11px; color: #8e8e93; margin-top: 4px; }

  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 30px 20px 50px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    display: flex; flex-direction: column; gap: 12px;
    pointer-events: all;
  }
  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 14px; border-radius: 16px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
    touch-action: manipulation; transition: opacity 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:active { opacity: 0.7; transform: scale(0.97); }
  .btn-start { background: #1c86f5; color: #fff; }
  .btn-auto { background: #1e3a1e; color: #30d158; border: 1px solid #30d158; }
  .btn-auto.on { background: #30d158; color: #000; }
  .heard-text { font-size: 12px; color: #aeaeb2; text-align: center; min-height: 16px; padding: 0 10px; }
  .version {
    position: absolute; bottom: 8px; right: 12px;
    font-size: 10px; color: rgba(255,255,255,0.25);
    font-family: monospace; pointer-events: none;
  }
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div class="overlay">
  <div class="top-bar">
    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Tap Start to begin</span>
    </div>
    <div class="narration" id="narration">—</div>
    <div class="motor-status" id="motor-status">—</div>
    <div class="duration-info" id="duration-info"></div>
  </div>

  <div class="bottom-bar">
    <div class="heard-text" id="heard-text"></div>
    <div class="btn-row" id="control-btns">
      <button class="btn btn-auto" id="auto-btn" onclick="toggleAuto()" style="display:none">🤖 Auto OFF</button>
    </div>
    <div class="btn-row">
      <button class="btn" id="stop-cam-btn" onclick="stopCamera()" style="display:none; background:#1a1a26; color:#ff453a; border:1px solid #ff453a;">⏹ Stop Camera</button>
    </div>
    <button class="btn btn-start" id="start-btn" onclick="startCamera()">▶ Start Robocar</button>
  </div>
</div>

<div class="version">robocar v1.5.0</div>

<script>
const BACKEND = 'https://robocar-llm.onrender.com';
const SIGNAL  = 'wss://robocar-llm.onrender.com/signal';
const CAM_ID  = 'robocar-cam';
const ROBOT_IP = '192.168.0.101';

let stream = null, ws = null;
let autoMode = false, autoInterval = null;
let isProcessing = false;
let lastVisionCmd = null;
let audioCtx = null;

function setStatus(msg, state) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-dot').className = 'status-dot' + (state ? ' ' + state : '');
}
function setNarration(msg) { document.getElementById('narration').textContent = msg; }
function setHeard(msg) { document.getElementById('heard-text').textContent = msg; }
function setMotor(cmd) {
  const labels = { F:'⬆ Forward', B:'⬇ Back', L:'⬅ Left', R:'➡ Right', S:'⏹ Stop' };
  const el = document.getElementById('motor-status');
  el.textContent = labels[cmd] || cmd;
  el.style.color = cmd === 'S' ? '#ff453a' : '#30d158';
}
function setDuration(ms) {
  document.getElementById('duration-info').textContent = ms ? `Duration: ${ms}ms` : '';
}

// Convert base64 PCM L16 to playable WAV
function pcmToWav(base64Pcm, sampleRate = 24000) {
  const pcmBytes = Uint8Array.from(atob(base64Pcm), c => c.charCodeAt(0));
  const numChannels = 1;
  const bitsPerSample = 16;
  const byteRate = sampleRate * numChannels * bitsPerSample / 8;
  const blockAlign = numChannels * bitsPerSample / 8;
  const dataSize = pcmBytes.length;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  function writeString(offset, str) { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); }
  writeString(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitsPerSample, true);
  writeString(36, 'data');
  view.setUint32(40, dataSize, true);
  new Uint8Array(buffer, 44).set(pcmBytes);
  return buffer;
}

// Play TTS audio from Gemini
async function playTTS(text) {
  try {
    const res = await fetch(BACKEND + '/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    if (data.audio) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const wavBuffer = pcmToWav(data.audio);
      const audioBuffer = await audioCtx.decodeAudioData(wavBuffer);
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioCtx.destination);
      source.start(0);
    }
  } catch(e) {
    console.log('TTS error:', e.message);
  }
}

// Send motor command via WebSocket → Mac Chrome → ESP32
function sendCmd(cmd) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'motor', cmd: cmd }));
    setMotor(cmd);
  }
}

// Capture frame
function captureFrame() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = 480; canvas.height = 360;
  canvas.getContext('2d').drawImage(video, 0, 0, 480, 360);
  return canvas.toDataURL('image/jpeg', 0.65).split(',')[1];
}

// Vision loop
async function runVision() {
  if (isProcessing || !autoMode) return;
  isProcessing = true;
  try {
    const frame = captureFrame();
    setNarration('📸 Analyzing…');
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);
    const res = await fetch(BACKEND + '/vision', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: frame }),
      signal: controller.signal
    });
    clearTimeout(timeout);
    const data = await res.json();

    if (data.cmd) {
      const duration = data.duration || 800;
      const cmdLabel = {F:'Moving forward',B:'Moving back',L:'Turning left',R:'Turning right'};
      setStatus('🤖 ' + (cmdLabel[data.cmd] || data.cmd), 'active');
      setDuration(duration);

      // Execute move for dynamic duration then auto-stop
      sendCmd(data.cmd);
      setTimeout(() => {
        sendCmd('S');
        setMotor('S');
      }, duration);
    }

    // Narration + TTS (non-blocking, runs in parallel)
    if (data.speak && data.narration) {
      setNarration(data.narration);
      playTTS(data.narration); // Gemini TTS — runs async
    } else if (data.narration) {
      setNarration(data.narration);
    }

    lastVisionCmd = data.cmd;
  } catch(e) {
    setNarration('Vision error — retrying…');
  }
  isProcessing = false;
  scheduleNextVision();
}

function scheduleNextVision() {
  if (!autoMode) return;
  setTimeout(() => {
    if (autoMode) runVision();
  }, 1200);
}

// Toggle autonomous mode
function toggleAuto() {
  autoMode = !autoMode;
  const btn = document.getElementById('auto-btn');
  if (autoMode) {
    btn.textContent = '🤖 Auto ON';
    btn.classList.add('on');
    setStatus('🤖 Autonomous — dynamic speed', 'active');
    // Unlock audio context
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
    runVision();
  } else {
    btn.textContent = '🤖 Auto OFF';
    btn.classList.remove('on');
    sendCmd('S');
    setStatus('📷 Camera on', 'active');
    setNarration('Autonomous mode stopped.');
    setDuration('');
  }
}

// Start camera
async function startCamera() {
  document.getElementById('start-btn').style.display = 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
    setStatus('📷 Camera on', 'active');
    document.getElementById('auto-btn').style.display = 'flex';
    document.getElementById('stop-cam-btn').style.display = 'flex';
    connectSignaling();
  } catch(e) {
    setStatus('Camera error: ' + e.message);
    document.getElementById('start-btn').style.display = 'block';
  }
}

// Stop camera
function stopCamera() {
  if (autoMode) toggleAuto();
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (ws) ws.close();
  sendCmd('S');
  document.getElementById('video').srcObject = null;
  document.getElementById('auto-btn').style.display = 'none';
  document.getElementById('stop-cam-btn').style.display = 'none';
  document.getElementById('start-btn').style.display = 'block';
  setStatus('Camera off', '');
  setNarration('—');
  setDuration('');
}

// WebRTC signaling for Mac viewer
function connectSignaling() {
  ws = new WebSocket(SIGNAL);
  ws.onopen = () => ws.send(JSON.stringify({ type: 'register', id: CAM_ID }));
  ws.onmessage = async (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'pong') return;
    if (msg.type === 'signal' && msg.data.type === 'offer') {
      const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      stream.getTracks().forEach(track => pc.addTrack(track, stream));
      pc.onicecandidate = e => {
        if (e.candidate) ws.send(JSON.stringify({ type: 'signal', target: msg.from, data: { type: 'candidate', candidate: e.candidate } }));
      };
      await pc.setRemoteDescription(new RTCSessionDescription(msg.data));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      ws.send(JSON.stringify({ type: 'signal', target: msg.from, data: answer }));
    }
  };
  setInterval(() => { if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' })); }, 30000);
  ws.onclose = () => setTimeout(connectSignaling, 3000);
}
</script>
</body>
</html>
