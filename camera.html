<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Robocar Camera</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
  video { width: 100vw; height: 100vh; object-fit: cover; }
  .overlay {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 20px 16px; z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  }
  .status { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #aeaeb2; }
  .start-btn {
    position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
    background: #1c86f5; color: #fff; border: none;
    padding: 16px 48px; border-radius: 30px;
    font-size: 17px; font-weight: 600; cursor: pointer; z-index: 10;
  }
</style>
</head>
<body>
<div class="overlay">
  <div class="status" id="status">Tap Start to stream</div>
  <div class="sub" id="sub">iPhone camera → Mac browser</div>
</div>
<video id="video" autoplay playsinline muted></video>
<button class="start-btn" id="start-btn" onclick="startCamera()">Start Camera</button>

<script>
const SIGNAL_URL = 'wss://robocar-llm.onrender.com/signal';
const CAM_ID = 'robocar-cam';
let ws = null;
let pc = null;
let stream = null;

function setStatus(msg, sub) {
  document.getElementById('status').textContent = msg;
  if (sub) document.getElementById('sub').textContent = sub;
}

async function startCamera() {
  document.getElementById('start-btn').style.display = 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
    setStatus('📷 Camera on', 'Connecting to server…');
    connectSignaling();
  } catch(e) {
    setStatus('Camera error: ' + e.message);
    document.getElementById('start-btn').style.display = 'block';
  }
}

function connectSignaling() {
  ws = new WebSocket(SIGNAL_URL);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'register', id: CAM_ID }));
  };

  ws.onmessage = async (evt) => {
    const msg = JSON.parse(evt.data);

    if (msg.type === 'registered') {
      setStatus('✅ Ready — waiting for Mac', 'Keep this page open');
    }

    if (msg.type === 'signal') {
      const data = msg.data;

      if (data.type === 'offer') {
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        stream.getTracks().forEach(track => pc.addTrack(track, stream));

        pc.onicecandidate = e => {
          if (e.candidate) {
            ws.send(JSON.stringify({
              type: 'signal', target: msg.from,
              data: { type: 'candidate', candidate: e.candidate }
            }));
          }
        };

        await pc.setRemoteDescription(new RTCSessionDescription(data));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({ type: 'signal', target: msg.from, data: answer }));
        setStatus('📡 Streaming to Mac', 'Live feed active');

      } else if (data.type === 'candidate' && pc) {
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
      }
    }
  };

  ws.onclose = () => {
    setStatus('⚠️ Disconnected', 'Reconnecting…');
    setTimeout(connectSignaling, 3000);
  };

  ws.onerror = () => setStatus('Connection error', 'Retrying…');
}
</script>
</body>
</html>
